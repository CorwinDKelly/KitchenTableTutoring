<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact • Kitchen Table Tutoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>Kitchen Table Tutoring</header>

  <main class="container">
    <h1>Math Tutoring in Santa Cruz</h1>
    <p class="cred">B.S. Mathematics, UCSC · 8+ years tutoring experience</p>
    <h2>Contact</h2>
    <p>Have a question or want to schedule a session? Get in touch below.</p>
    <p class="form-note">I usually respond within 24 hours.</p>

    <!-- ACTION = your Formspree endpoint -->
    <form class="kt-form" action="https://formspree.io/f/xjkelrql" method="POST">
      <div class="field">
        <label for="name">Full name <span aria-hidden="true">*</span></label>
        <input id="name" name="name" type="text" required autocomplete="name" />
      </div>

      <div class="field">
        <label for="email">Email <span aria-hidden="true">*</span></label>
        <input id="email" name="_replyto" type="email" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="phone">Phone (optional)</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" />
      </div>

      <div class="field">
        <label for="message">What would you like help with? <span aria-hidden="true">*</span></label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <input type="hidden" name="source" id="source-field">

      <button class="btn-primary" type="submit">Contact Me</button>
    </form>

    <p class="form-note">
      Not ready yet? <a href="https://santacruzmath.com">Learn more about my tutoring</a>.
    </p>
  </main>

  <footer>© 2026 Kitchen Table Tutoring</footer>
</body>
</html>
